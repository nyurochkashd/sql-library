<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Библиотека SQL-запросов и скриптов</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Unbounded:wght@400;600&family=Inter:wght@400;500&display=swap');
:root{--bg:#0f1117;--surface:#181c27;--surface2:#1e2335;--border:#2a3045;--blue:#4a9eff;--green:#3ecf8e;--purple:#a855f7;--text:#e8eaf0;--muted:#6b7280;--dim:#9ca3af;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{padding:2.5rem 2rem 1.5rem;border-bottom:1px solid var(--border);}
.header-inner{max-width:1100px;margin:0 auto;}
h1{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:600;letter-spacing:-0.5px;}
.header p{font-size:13px;color:var(--muted);margin-top:6px;}
.tabs{display:flex;gap:6px;padding:1.25rem 2rem;max-width:1100px;margin:0 auto;flex-wrap:wrap;}
.tab{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;font-size:13px;color:var(--muted);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.tab:hover{color:var(--dim);}
.tab.active{background:var(--surface2);border-color:#3a4055;color:var(--text);}
.main{max-width:1100px;margin:0 auto;padding:0 2rem 3rem;}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .2s;}
.card.sql::before{background:linear-gradient(90deg,var(--blue),transparent);}
.card.script::before{background:linear-gradient(90deg,var(--purple),transparent);}
.card.oge::before{background:linear-gradient(90deg,var(--green),transparent);}
.card:hover{border-color:#3a4055;transform:translateY(-1px);}
.card:hover::before{opacity:1;}
.badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 8px;border-radius:4px;margin-bottom:10px;font-family:'JetBrains Mono',monospace;}
.badge-ege{background:rgba(74,158,255,.15);color:var(--blue);}
.badge-oge{background:rgba(62,207,142,.15);color:var(--green);}
.badge-script{background:rgba(168,85,247,.15);color:var(--purple);}
.card-title{font-size:14px;font-weight:500;margin-bottom:6px;line-height:1.4;}
.card-desc{font-size:12px;color:var(--muted);line-height:1.6;}
.card-meta{font-size:11px;color:var(--muted);margin-top:12px;font-family:'JetBrains Mono',monospace;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;padding:2rem 1rem;overflow-y:auto;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;align-items:flex-start;justify-content:center;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:760px;overflow:hidden;}
.modal-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;}
.modal-title{font-size:16px;font-weight:500;}
.modal-sub{font-size:12px;color:var(--muted);margin-top:4px;font-family:'JetBrains Mono',monospace;}
.modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;flex-shrink:0;}
.modal-close:hover{color:var(--text);}
.actions{padding:.75rem 1.5rem;display:flex;gap:8px;border-bottom:1px solid var(--border);}
.actions.bottom{border-bottom:none;border-top:1px solid var(--border);}
.btn{padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);font-size:12px;color:var(--dim);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.btn:hover{border-color:#3a4055;color:var(--text);}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue);}
.btn.primary:hover{opacity:.9;}
.code-block{background:#0a0d14;padding:1.25rem 1.5rem;font-family:'JetBrains Mono',monospace;font-size:12px;color:#c9d1d9;line-height:1.7;overflow-x:auto;white-space:pre;max-height:420px;overflow-y:auto;}
.code-block::-webkit-scrollbar{width:6px;height:6px;}
.code-block::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <h1>Библиотека запросов и скриптов</h1>
    <p>SQL-запросы для выгрузки результатов ГИА · Скрипты мониторинга ППЭ</p>
  </div>
</div>
<div class="tabs">
  <button class="tab active" onclick="filter('all',this)">Все</button>
  <button class="tab" onclick="filter('ege',this)">ЕГЭ</button>
  <button class="tab" onclick="filter('oge',this)">ОГЭ</button>
  <button class="tab" onclick="filter('script',this)">Скрипты</button>
</div>
<div class="main"><div id="cards" class="cards"></div></div>
<div class="modal-overlay" id="modal" onclick="handleOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <div><div class="modal-title" id="modal-title"></div><div class="modal-sub" id="modal-sub"></div></div>
      <button class="modal-close" onclick="closeModal()">&#215;</button>
    </div>
    <div class="actions">
      <button class="btn primary" onclick="copyCode()">&#8856; Скопировать</button>
      <button class="btn" onclick="downloadCode()">&#8595; Скачать</button>
    </div>
    <div class="code-block" id="modal-code"></div>
    <div class="actions bottom">
      <button class="btn primary" onclick="copyCode()">&#8856; Скопировать</button>
      <button class="btn" onclick="downloadCode()">&#8595; Скачать</button>
    </div>
  </div>
</div>
<script>

   ДАННЫЕ БИБЛИОТЕКИ

   - id: уникальный номер
   - type: "ege", "oge" или "script"
   - css: "sql", "oge" или "script"

   - desc: описание
   - meta: база данных или сайт
   - ext: расширение файла (.sql, .user.js, .md)

6.07.09') THEN 'ИЮЛЬ'\n        WHEN e.WaveCode=3 THEN 'ПЕРЕСД'\n        ELSE 'Иное'\n    END AS [Период],\n    m.PrimaryMark AS [Первичный балл],\n    m.Mark100 AS [Тестовый балл],\n    m.Mark5 AS [Оценка],\n    (SELECT COUNT(DISTINCT ht2.SubjectCode) FROM res_HumanTests ht2 JOIN res_Marks m2 ON m2.HumanTestID=ht2.HumanTestID AND m2.REGION=ht2.REGION WHERE ht2.ParticipantFK=p.ParticipantID AND ht2.REGION=p.Region AND ht2.TestTypeCode IN (4,5)) AS [Кол-во предметов],\n    CASE WHEN EXISTS (SELECT 1 FROM res_HumanTests ht2 JOIN res_Marks m2 ON m2.HumanTestID=ht2.HumanTestID AND m2.REGION=ht2.REGION WHERE ht2.ParticipantFK=p.ParticipantID AND ht2.REGION=p.Region AND ht2.TestTypeCode IN (4,5) AND ht2.SubjectCode IN (1,51)) AND EXISTS (SELECT 1 FROM res_HumanTests ht3 JOIN res_Marks m3 ON m3.HumanTestID=ht3.HumanTestID AND m3.REGION=ht3.REGION WHERE ht3.ParticipantFK=p.ParticipantID AND ht3.REGION=p.Region AND ht3.TestTypeCode IN (4,5) AND ht3.SubjectCode IN (2,22,52)) THEN 1 ELSE 0 END AS [Сдал обязательные],\n    CASE WHEN EXISTS (SELECT 1 FROM res_HumanTests ht4 JOIN res_Marks m4 ON m4.HumanTestID=ht4.HumanTestID AND m4.REGION=ht4.REGION WHERE ht4.ParticipantFK=p.ParticipantID AND ht4.REGION=p.Region AND ht4.TestTypeCode IN (4,5) AND ht4.SubjectCode=2) AND EXISTS (SELECT 1 FROM res_HumanTests ht5 JOIN res_Marks m5 ON m5.HumanTestID=ht5.HumanTestID AND m5.REGION=ht5.REGION WHERE ht5.ParticipantFK=p.ParticipantID AND ht5.REGION=p.Region AND ht5.TestTypeCode IN (4,5) AND ht5.SubjectCode IN (3,4,6)) THEN 1 ELSE 0 END AS [Матпроф и ест науки],\n    CASE WHEN ap.AppealID IS NOT NULL AND ap.AppealCondition=100 THEN 'Удовлетворена' WHEN ap.AppealID IS NOT NULL AND ap.AppealCondition=101 THEN 'Отклонена' WHEN ap.AppealID IS NOT NULL THEN 'В процессе' ELSE 'Нет апелляции' END AS [Апелляция],\n    ROW_NUMBER() OVER (PARTITION BY p.ParticipantID, ht.SubjectCode ORDER BY ht.ExamDate) AS [Попытка],\n    CASE WHEN ROW_NUMBER() OVER (PARTITION BY p.ParticipantID, ht.SubjectCode ORDER BY CASE WHEN e.WaveCode=3 THEN 0 ELSE 1 END DESC, ht.ExamDate DESC)=1 AND e.WaveCode!=3 THEN 1 ELSE 0 END AS [После ИЮЛЯ],\n    CASE WHEN ROW_NUMBER() OVER (PARTITION BY p.ParticipantID, ht.SubjectCode ORDER BY ht.ExamDate DESC)=1 THEN 1 ELSE 0 END AS [Итоговый результат]\nFROM rbd_Participants p\nOUTER APPLY (\n    SELECT TOP 1 Changes FROM ac_PersonsCorrections\n    WHERE PersonID = p.ParticipantID ORDER BY CreateDate DESC\n) pc\nJOIN res_HumanTests ht ON ht.ParticipantFK = p.ParticipantID AND ht.REGION = p.Region\nJOIN res_Marks m ON m.HumanTestID = ht.HumanTestID AND m.REGION = ht.REGION\nJOIN dat_Exams e ON e.SubjectCode = ht.SubjectCode AND e.ExamDate = ht.ExamDate AND e.TestTypeCode = ht.TestTypeCode\nJOIN dat_Waves w ON w.WaveCode = e.WaveCode\nLEFT JOIN dat_Subjects s ON s.SubjectCode = ht.SubjectCode\nLEFT JOIN rbd_Schools sch ON sch.SchoolID = p.SchoolRegistration AND sch.REGION = p.Region\nLEFT JOIN rbd_Areas a ON a.AreaID = sch.AreaFK AND a.Region = sch.REGION\nOUTER APPLY (\n    SELECT TOP 1 AppealID, AppealCondition FROM ac_Appeals\n    WHERE HumanTestFK = ht.HumanTestID AND REGION = ht.REGION\n    ORDER BY UpdateTime DESC\n) ap\nWHERE ht.TestTypeCode IN (4,5)\nORDER BY [ФИО], s.SubjectName, ht.ExamDate;"

SE WHEN ROW_NUMBER() OVER (PARTITION BY p.ParticipantID, ht.SubjectCode ORDER BY CASE WHEN e.WaveCode=3 THEN 0 ELSE 1 END DESC, ht.ExamDate DESC)=1 AND e.WaveCode!=3 THEN 1 ELSE 0 END AS [После ИЮЛЯ],\n    CASE WHEN ROW_NUMBER() OVER (PARTITION BY p.ParticipantID, ht.SubjectCode ORDER BY ht.ExamDate DESC)=1 THEN 1 ELSE 0 END AS [Итоговый результат]\nFROM rbd_Participants p\nOUTER APPLY (\n    SELECT TOP 1 Changes FROM ac_PersonsCorrections\n    WHERE PersonID = p.ParticipantID ORDER BY CreateDate DESC\n) pc\nJOIN res_HumanTests ht ON ht.ParticipantFK = p.ParticipantID AND ht.REGION = p.Region\nJOIN res_Marks m ON m.HumanTestID = ht.HumanTestID AND m.REGION = ht.REGION\nJOIN dat_Exams e ON e.SubjectCode = ht.SubjectCode AND e.ExamDate = ht.ExamDate AND e.TestTypeCode = ht.TestTypeCode\nJOIN dat_Waves w ON w.WaveCode = e.WaveCode\nLEFT JOIN dat_Subjects s ON s.SubjectCode = ht.SubjectCode\nLEFT JOIN rbd_Schools sch ON sch.SchoolID = p.SchoolRegistration AND sch.REGION = p.Region\nLEFT JOIN rbd_Areas a ON a.AreaID = sch.AreaFK AND a.Region = sch.REGION\nOUTER APPLY (\n    SELECT TOP 1 AppealID, AppealCondition FROM ac_Appeals\n    WHERE HumanTestFK = ht.HumanTestID AND REGION = ht.REGION\n    ORDER BY UpdateTime DESC\n) ap\nWHERE ht.TestTypeCode IN (4,5)\nORDER BY [ФИО], s.SubjectName, ht.ExamDate;"

    "title": "Результаты ОГЭ 2024",
    "desc": "Все участники всех периодов. Форма по участнику, МО сокращены, OUTER APPLY для коррекций.",
    "meta": "erbd_gia_reg_24_89",
    "ext": ".sql",
    "code": "USE erbd_gia_reg_24_89;\n\nSELECT\n    ISNULL(CAST(pc.Changes AS xml).value('(Changes/Change[Column=\"Surname\"]/NewValue)[1]','varchar(80)'),p.Surname)+' '+\n    ISNULL(CAST(pc.Changes AS xml).value('(Changes/Change[Column=\"Name\"]/NewValue)[1]','varchar(80)'),p.Name)+' '+\n    ISNULL(CAST(pc.Changes AS xml).value('(Changes/Change[Column=\"SecondName\"]/NewValue)[1]','varchar(80)'),ISNULL(p.SecondName,'')) AS [ФИО],\n    ISNULL(CAST(pc.Changes AS xml).value('(Changes/Change[Column=\"DocumentSeries\"]/NewValue)[1]','varchar(9)'),p.DocumentSeries)+' '+\n    ISNULL(CAST(pc.Changes AS xml).value('(Changes/Change[Column=\"DocumentNumber\"]/NewValue)[1]','varchar(12)'),p.DocumentNumber) AS [Документ],\n    CASE p.Sex WHEN 1 THEN 'М' WHEN 0 THEN 'Ж' END AS [Пол],\n    p.pClass AS [Класс],\n    sch.SchoolName AS [Школа],\n    REPLACE(REPLACE(a.AreaName,'Муниципальное образование','МО'),'Муниципальный округ','МО') AS [Муниципалитет],\n    CASE p.ParticipantCategoryFK\n        WHEN 1  THEN 'ВТГ' WHEN 3  THEN 'СПО' WHEN 4  THEN 'ВПЛ'\n        WHEN 8  THEN 'Не завершил ГИА' WHEN 9  THEN 'Иностранная организация'\n        WHEN 10 THEN 'Завершил по предмету' ELSE 'Иное'\n    END AS [Категория],\n    CASE WHEN EXISTS (SELECT 1 FROM res_HumanTests ht2 WHERE ht2.ParticipantFK=p.ParticipantID AND ht2.REGION=p.Region AND ht2.TestTypeCode=6) THEN 'ОГЭ' ELSE 'ГВЭ' END AS [Форма],\n    ht.SubjectCode AS [Код предмета],\n    s.SubjectName AS [Предмет],\n    CASE ht.TestTypeCode WHEN 6 THEN 'ОГЭ' WHEN 7 THEN 'ГВЭ' END AS [Форма предмета],\n    ht.ExamDate AS [Дата экзамена],\n    w.WaveName AS [Волна],\n    CASE\n        WHEN e.WaveCode=1 THEN 'ДОСРОК'\n        WHEN e.WaveCode=2 AND ht.ExamDate IN ('2024.05.21','2024.05.22','2024.05.27','2024.05.30','2024.06.03','2024.06.06','2024.06.10','2024.06.14') THEN 'ОСН'\n        WHEN e.WaveCode=2 AND ht.ExamDate IN ('2024.06.24','2024.06.25','2024.06.26','2024.06.27','2024.07.01','2024.07.02') THEN 'РЕЗЕРВ'\n        WHEN e.WaveCode=3 THEN 'ПЕРЕСД'\n        ELSE 'Иное'\n    END AS [Период],\n    m.PrimaryMark AS [Первичный балл],\n    m.PercentMark AS [Процентный балл],\n    m.Mark5 AS [Оценка],\n    (SELECT COUNT(DISTINCT ht2.SubjectCode) FROM res_HumanTests ht2 JOIN res_Marks m2 ON m2.HumanTestID=ht2.HumanTestID AND m2.REGION=ht2.REGION WHERE ht2.ParticipantFK=p.ParticipantID AND ht2.REGION=p.Region AND ht2.TestTypeCode IN (6,7)) AS [Кол-во предметов],\n    CASE WHEN EXISTS (SELECT 1 FROM res_HumanTests ht2 JOIN res_Marks m2 ON m2.HumanTestID=ht2.HumanTestID AND m2.REGION=ht2.REGION WHERE ht2.ParticipantFK=p.ParticipantID AND ht2.REGION=p.Region AND ht2.TestTypeCode IN (6,7) AND ht2.SubjectCode IN (1,51)) AND EXISTS (SELECT 1 FROM res_HumanTests ht3 JOIN res_Marks m3 ON m3.HumanTestID=ht3.HumanTestID AND m3.REGION=ht3.REGION WHERE ht3.ParticipantFK=p.ParticipantID AND ht3.REGION=p.Region AND ht3.TestTypeCode IN (6,7) AND ht3.SubjectCode IN (2,52)) THEN 1 ELSE 0 END AS [Сдал обязательные],\n    CASE WHEN ap.AppealID IS NOT NULL AND ap.AppealCondition=100 THEN 'Удовлетворена' WHEN ap.AppealID IS NOT NULL AND ap.AppealCondition=101 THEN 'Отклонена' WHEN ap.AppealID IS NOT NULL THEN 'В процессе' ELSE 'Нет апелляции' END AS [Апелляция],\n    ROW_NUMBER() OVER (PARTITION BY p.ParticipantID, ht.SubjectCode ORDER BY ht.ExamDate) AS [Попытка],\n    CASE WHEN ROW_NUMBER() OVER (PARTITION BY p.ParticipantID, ht.SubjectCode ORDER BY ht.ExamDate DESC)=1 THEN 1 ELSE 0 END AS [Итоговый результат]\nFROM rbd_Participants p\nOUTER APPLY (\n    SELECT TOP 1 Changes FROM ac_PersonsCorrections\n    WHERE PersonID = p.ParticipantID ORDER BY CreateDate DESC\n) pc\nJOIN res_HumanTests ht ON ht.ParticipantFK = p.ParticipantID AND ht.REGION = p.Region\nJOIN res_Marks m ON m.HumanTestID = ht.HumanTestID AND m.REGION = ht.REGION\nJOIN dat_Exams e ON e.SubjectCode = ht.SubjectCode AND e.ExamDate = ht.ExamDate AND e.TestTypeCode = ht.TestTypeCode\nJOIN dat_Waves w ON w.WaveCode = e.WaveCode\nLEFT JOIN dat_Subjects s ON s.SubjectCode = ht.SubjectCode\nLEFT JOIN rbd_Schools sch ON sch.SchoolID = p.SchoolRegistration AND sch.REGION = p.Region\nLEFT JOIN rbd_Areas a ON a.AreaID = sch.AreaFK AND a.Region = sch.REGION\nOUTER APPLY (\n    SELECT TOP 1 AppealID, AppealCondition FROM ac_Appeals\n    WHERE HumanTestFK = ht.HumanTestID AND REGION = ht.REGION\n    ORDER BY UpdateTime DESC\n) ap\nWHERE ht.TestTypeCode IN (6,7)\nORDER BY [ФИО], s.SubjectName, ht.ExamDate;"

    "title": "Схема БД ЕГЭ (документация)",
    "desc": "Полная схема таблиц, связей, справочников и примеры запросов для баз ЕГЭ.",
    "meta": "Markdown документация",
    "ext": ".md",
    "code": "# Схема базы данных ЕГЭ (erbd_ege_reg_XX_89)\n\n## Назначение базы\nРегиональная база данных результатов ЕГЭ. Содержит данные участников, результаты экзаменов, информацию о школах и муниципалитетах. Одна база = один год проведения экзаменов.\n\n---\n\n## Основные таблицы и связи\n\n### 1. rbd_Participants — Участники экзаменов\nГлавная таблица. Каждая строка = один участник.\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| ParticipantID | uniqueidentifier | **PRIMARY KEY** уникальный ID участника |\n| Region | int | Код региона |\n| Surname | varchar | Фамилия |\n| Name | varchar | Имя |\n| SecondName | varchar | Отчество (может быть NULL) |\n| DocumentSeries | varchar | Серия документа (паспорт) |\n| DocumentNumber | varchar | Номер документа |\n| DocumentTypeCode | int | Тип документа |\n| BirthDay | datetime | Дата рождения |\n| Sex | bit | Пол (0=женский, 1=мужской) |\n| pClass | varchar | Класс (например \"11А\") |\n| ParticipantCategoryFK | int | **FK → rbdc_ParticipantCategories.CategoryCode** Категория участника |\n| SchoolRegistration | uniqueidentifier | **FK → rbd_Schools.SchoolID** Школа регистрации |\n| DeleteType | int | Признак удаления (0 = активная запись) |\n| Snils | varchar | СНИЛС |\n\n**Значения ParticipantCategoryFK:**\n- 1 = ВТГ (выпускник текущего года / школьник)\n- 3 = СПО\n- 4 = ВПЛ (выпускник прошлых лет)\n- 8 = Не завершил ГИА\n- 9 = Иностранная организация\n- 10 = Завершил по предмету\n\n---\n\n### 2. res_HumanTests — Факты сдачи экзаменов\nКаждая строка = один экзамен одного участника (один предмет, одна дата).\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| HumanTestID | uniqueidentifier | **PRIMARY KEY** |\n| REGION | int | Код региона |\n| ParticipantFK | uniqueidentifier | **FK → rbd_Participants.ParticipantID** |\n| SubjectCode | int | **FK → dat_Subjects.SubjectCode** Код предмета |\n| TestTypeCode | int | Тип экзамена (4=ЕГЭ, 5=ГВЭ) |\n| ExamDate | varchar | Дата экзамена в формате ГГГГ.ММ.ДД |\n| ProcessCondition | int | Статус обработки (6=оценённый результат) |\n| LicenseCondition | int | Условие сдачи |\n| WaveCode | int | Волна экзамена |\n| StationCode | int | Код ППЭ |\n| AuditoriumCode | varchar | Код аудитории |\n| VariantCode | int | Вариант КИМ |\n\n**Значения TestTypeCode:**\n- 4 = ЕГЭ\n- 5 = ГВЭ (государственный выпускной экзамен)\n\n**Периоды экзаменов (2025 год):**\n- ДОСРОК: 2025.04.01, 2025.04.09\n- ОСН: 2025.05.23, 2025.05.27, 2025.05.30, 2025.06.02, 2025.06.05, 2025.06.10, 2025.06.11\n- РЕЗЕРВ: 2025.06.16, 2025.06.17, 2025.06.18, 2025.06.19, 2025.06.20, 2025.06.23\n- ИЮЛЬ: 2025.07.03, 2025.07.04\n- ПЕРЕСД: 2025.09.04, 2025.09.08, 2025.09.23\n\n**JOIN условие:** всегда соединять по двум полям:\n```sql\nON ht.ParticipantFK = p.ParticipantID AND ht.REGION = p.Region\n```\n\n---\n\n### 3. res_Marks — Результаты (баллы)\nКаждая строка = баллы за один экзамен. Связь 1:1 с res_HumanTests.\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| HumanTestID | uniqueidentifier | **FK → res_HumanTests.HumanTestID** |\n| REGION | int | Код региона |\n| PrimaryMark | int | Первичный балл (итоговый) |\n| Mark100 | int | Тестовый балл по 100-балльной шкале |\n| Mark5 | int | Оценка по 5-балльной шкале (2=не сдал, -1=аннулирован/пересдан) |\n| PercentMark | int | Процентный балл |\n| MarkX | int | Специальный статус |\n| Rating | float | Рейтинг/процентиль |\n| PrimaryMarkA | int | Первичный балл часть A |\n| PrimaryMarkB | int | Первичный балл часть B |\n| PrimaryMarkC | int | Первичный балл часть C |\n| PrimaryMarkD | int | Первичный балл часть D |\n| TestResultA | varchar | Детализация по заданиям части A |\n| TestResultB | varchar | Детализация по заданиям части B |\n| TestResultC | varchar | Детализация по заданиям части C (формат: балл(макс)балл(макс)...) |\n| TestResultD | varchar | Детализация по заданиям части D |\n\n**Важно:**\n- Для ЕГЭ основной показатель = Mark100\n- Mark5 = 2 означает не преодолел минимальный порог\n- Mark5 = -1 означает результат аннулирован (например пересдача по двойке)\n- Для ГВЭ (TestTypeCode=5) Mark100 = 0, используется Mark5\n- Математика базовая (SubjectCode=22) — результат в Mark5, не в Mark100\n\n**JOIN условие:**\n```sql\nON m.HumanTestID = ht.HumanTestID AND m.REGION = ht.REGION\n```\n\n---\n\n### 4. dat_Subjects — Справочник предметов\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| SubjectCode | int | **PRIMARY KEY** |\n| TestTypeCode | int | Тип экзамена |\n| SubjectName | varchar | Название предмета |\n\n**Коды обязательных предметов ЕГЭ:**\n- 1 = Русский язык (ЕГЭ)\n- 51 = Русский язык (ГВЭ)\n- 2 = Математика профильная\n- 22 = Математика базовая\n- 52 = Математика (ГВЭ)\n\n**Коды естественных наук:**\n- 3 = Физика\n- 4 = Химия\n- 6 = Биология\n\n**JOIN условие:**\n```sql\nON s.SubjectCode = ht.SubjectCode\n```\n\n---\n\n### 5. rbd_Schools — Школы\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| SchoolID | uniqueidentifier | **PRIMARY KEY** |\n| REGION | int | Код региона |\n| SchoolCode | int | Код школы (5-6 знаков) |\n| SchoolName | varchar | Название школы |\n| AreaFK | uniqueidentifier | **FK → rbd_Areas.AreaID** Муниципалитет |\n| DeleteType | int | Признак удаления |\n\n**JOIN условие:**\n```sql\nON sch.SchoolID = p.SchoolRegistration AND sch.REGION = p.Region\n```\n\n---\n\n### 6. rbd_Areas — Муниципалитеты\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| AreaID | uniqueidentifier | **PRIMARY KEY** |\n| Region | int | Код региона |\n| AreaCode | int | Код муниципалитета |\n| AreaName | varchar | Название муниципалитета |\n\n**JOIN условие:**\n```sql\nON a.AreaID = sch.AreaFK AND a.Region = sch.REGION\n```\n\n---\n\n### 7. ac_PersonsCorrections — Коррекции персональных данных\nХранит историю изменений ФИО и документов участников.\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| CorrectionID | uniqueidentifier | PRIMARY KEY |\n| REGION | int | Код региона |\n| PersonID | uniqueidentifier | **FK → rbd_Participants.ParticipantID** |\n| Changes | xml | XML с изменениями (старое/новое значение) |\n| Condition | int | Статус коррекции (102=принята) |\n| CorrectionType | smallint | Тип коррекции |\n\n**Структура XML в поле Changes:**\n```xml\n<Changes>\n  <Change>\n    <Column>Name</Column>\n    <OldValue>Даниил</OldValue>\n    <NewValue>Данил</NewValue>\n  </Change>\n  <Change>\n    <Column>DocumentNumber</Column>\n    <OldValue>083197</OldValue>\n    <NewValue>187028</NewValue>\n  </Change>\n</Changes>\n```\n\n**Как применять коррекцию в запросе (пример для Фамилии):**\n```sql\nISNULL(\n    CAST(pc.Changes AS xml).value('(Changes/Change[Column=\"Surname\"]/NewValue)[1]', 'varchar(80)'),\n    p.Surname\n)\n```\n\n**JOIN условие:**\n```sql\nLEFT JOIN ac_PersonsCorrections pc ON pc.PersonID = p.ParticipantID\n```\n\n---\n\n### 8. rbdc_ParticipantCategories — Справочник категорий участников\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| CategoryID | int | PRIMARY KEY |\n| CategoryCode | int | Код категории |\n| CategoryName | varchar | Название категории |\n\n---\n\n## Схема связей\n\n```\nrbd_Participants\n    │\n    ├── ParticipantID → res_HumanTests.ParticipantFK (+ REGION)\n    │       │\n    │       ├── HumanTestID → res_Marks.HumanTestID (+ REGION)\n    │       │\n    │       └── SubjectCode → dat_Subjects.SubjectCode\n    │\n    ├── SchoolRegistration → rbd_Schools.SchoolID (+ REGION)\n    │       │\n    │       └── AreaFK → rbd_Areas.AreaID\n    │\n    ├── ParticipantCategoryFK → rbdc_ParticipantCategories.CategoryCode\n    │\n    └── ParticipantID → ac_PersonsCorrections.PersonID\n```\n\n---\n\n## Типовой запрос выгрузки результатов ЕГЭ\n\n```sql\nSELECT\n    -- ФИО с учётом коррекций\n    ISNULL(CAST(pc.Changes AS xml).value('(Changes/Change[Column=\"Surname\"]/NewValue)[1]','varchar(80)'), p.Surname) + ' ' +\n    ISNULL(CAST(pc.Changes AS xml).value('(Changes/Change[Column=\"Name\"]/NewValue)[1]','varchar(80)'), p.Name) + ' ' +\n    ISNULL(CAST(pc.Changes AS xml).value('(Changes/Change[Column=\"SecondName\"]/NewValue)[1]','varchar(80)'), ISNULL(p.SecondName,'')) AS [ФИО],\n    -- Документ с учётом коррекций\n    ISNULL(CAST(pc.Changes AS xml).value('(Changes/Change[Column=\"DocumentSeries\"]/NewValue)[1]','varchar(9)'), p.DocumentSeries) + ' ' +\n    ISNULL(CAST(pc.Changes AS xml).value('(Changes/Change[Column=\"DocumentNumber\"]/NewValue)[1]','varchar(12)'), p.DocumentNumber) AS [Документ],\n    p.pClass AS [Класс],\n    sch.SchoolName AS [Школа],\n    a.AreaName AS [Муниципалитет],\n    CASE p.ParticipantCategoryFK\n        WHEN 1 THEN 'ВТГ' WHEN 3 THEN 'СПО' WHEN 4 THEN 'ВПЛ'\n        WHEN 8 THEN 'Не завершил ГИА' WHEN 9 THEN 'Иностранная организация'\n        WHEN 10 THEN 'Завершил по предмету' ELSE 'Иное'\n    END AS [Категория],\n    CASE ht.TestTypeCode WHEN 4 THEN 'ЕГЭ' WHEN 5 THEN 'ГВЭ' END AS [Форма],\n    ht.SubjectCode AS [Код предмета],\n    s.SubjectName AS [Предмет],\n    ht.ExamDate AS [Дата экзамена],\n    m.PrimaryMark AS [Первичный балл],\n    m.Mark100 AS [Тестовый балл],\n    m.Mark5 AS [Оценка]\nFROM rbd_Participants p\nLEFT JOIN ac_PersonsCorrections pc ON pc.PersonID = p.ParticipantID\nJOIN res_HumanTests ht ON ht.ParticipantFK = p.ParticipantID AND ht.REGION = p.Region\nJOIN res_Marks m ON m.HumanTestID = ht.HumanTestID AND m.REGION = ht.REGION\nLEFT JOIN dat_Subjects s ON s.SubjectCode = ht.SubjectCode\nLEFT JOIN rbd_Schools sch ON sch.SchoolID = p.SchoolRegistration AND sch.REGION = p.Region\nLEFT JOIN rbd_Areas a ON a.AreaID = sch.AreaFK AND a.Region = sch.REGION\nWHERE ht.TestTypeCode IN (4, 5)\nORDER BY [ФИО], s.SubjectName;\n```\n\n---\n\n## Важные особенности\n\n1. **Всегда соединять по двум полям** — ID + REGION, иначе данные перемешаются между регионами\n2. **DeleteType = 0** — активные записи участников (не удалённые)\n3. **Коррекции персональных данных** — актуальные ФИО и документы хранятся в ac_PersonsCorrections, а не в rbd_Participants\n4. **ExamDate — строка**, не дата. Формат ГГГГ.ММ.ДД. Для фильтрации использовать LIKE '2025%' или IN ('2025.05.23', ...)\n5. **Один участник — много строк** в результирующей выгрузке (по одной на каждый сданный предмет)\n6. **Именование баз:** erbd_ege_reg_25_89 = ЕГЭ 2025 год, регион 89. Число после reg_ = год\n\n---\n\n## Дополнительные таблицы\n\n### 9. ac_Appeals — Апелляции\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| AppealID | uniqueidentifier | PRIMARY KEY |\n| REGION | int | Код региона |\n| HumanTestFK | uniqueidentifier | **FK → res_HumanTests.HumanTestID** Экзамен по которому подана апелляция |\n| AppealType | int | Тип апелляции |\n| DeclinedByCommittee | bit | Отклонена комиссией (Истина/Ложь) |\n| CreateTime | datetime | Дата подачи апелляции |\n| UpdateTime | datetime | Дата последнего изменения |\n| InProcess | datetime | Дата начала рассмотрения |\n| AppealCondition | int | Статус апелляции (101=в работе, 102=завершена) |\n| WorkStation | int | Рабочая станция |\n| AppealComment | xml | Комментарий (решение комиссии) |\n\n**Значения AppealCondition:**\n- 101 = В работе\n- 102 = Завершена\n\n**JOIN условие:**\n```sql\nJOIN ac_Appeals ap ON ap.HumanTestFK = ht.HumanTestID AND ap.REGION = ht.REGION\n```\n\n---\n\n### 10. ac_AppealDecisions — Решения по апелляциям\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| DecisionID | uniqueidentifier | PRIMARY KEY |\n| REGION | int | Код региона |\n| AppealID | uniqueidentifier | **FK → ac_Appeals.AppealID** |\n| SheetFK_R | uniqueidentifier | ID бланка |\n| ExamID | int | ID экзамена |\n| ParticipantFK | uniqueidentifier | **FK → rbd_Participants.ParticipantID** |\n| IsDeleted | bit | Признак удаления |\n| DecisionNumber | varchar | Номер решения |\n| DecisionDate | varchar | Дата решения |\n| Responsible | varchar | Ответственный |\n\n---\n\n### 11. rbd_Stations — ППЭ (пункты проведения экзаменов)\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| StationID | uniqueidentifier | PRIMARY KEY |\n| REGION | int | Код региона |\n| AreaID | uniqueidentifier | **FK → rbd_Areas.AreaID** Муниципалитет |\n| StationCode | int | Код ППЭ (4 цифры, например 0042) |\n| StationName | varchar | Название ППЭ (например \"ППЭ-042 с.Гыда\") |\n| StationAddress | varchar | Адрес ППЭ |\n| SchoolFK | uniqueidentifier | **FK → rbd_Schools.SchoolID** Школа-база ППЭ |\n| sVolume | int | Вместимость (количество мест) |\n| IsActive | bit | Активен |\n| Phones | varchar | Телефоны |\n| Mails | varchar | Email |\n| AuditoriumsCount | int | Количество аудиторий |\n| DeleteType | int | Признак удаления |\n| ExamForm | int | Форма проведения |\n| VideoControl | bit | Видеонаблюдение |\n| IsTOM | bit | Труднодоступное/отдалённое место |\n\n**JOIN условие:**\n```sql\nJOIN rbd_Stations st ON st.StationCode = ht.StationCode AND st.REGION = ht.REGION\n```\n\n---\n\n### 12. rbd_ParticipantClasses — Классы участников\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| ParticipantClassID | uniqueidentifier | PRIMARY KEY |\n| REGION | int | Код региона |\n| ParticipantID | uniqueidentifier | **FK → rbd_Participants.ParticipantID** |\n| SchoolClassID | uniqueidentifier | ID класса в школе |\n| CreateDate | datetime | Дата создания |\n| UpdateDate | datetime | Дата обновления |\n\n---\n\n### 13. rbd_ParticipantsExams — Запись участников на экзамены\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| ParticipantsExamsID | uniqueidentifier | PRIMARY KEY |\n| REGION | int | Код региона |\n| ParticipantID | uniqueidentifier | **FK → rbd_Participants.ParticipantID** |\n| ExamGlobalID | int | Глобальный ID экзамена |\n| IsDeleted | bit | Признак удаления |\n| ExamFormatCode | int | Код формата экзамена |\n\n---\n\n### 14. rbd_ParticipantsSubject — Предметы участников\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| ID | uniqueidentifier | PRIMARY KEY |\n| REGION | int | Код региона |\n| ParticipantID | uniqueidentifier | **FK → rbd_Participants.ParticipantID** |\n| SubjectCode | int | **FK → dat_Subjects.SubjectCode** Выбранный предмет |\n| IsDeleted | bit | Признак удаления |\n\n**Назначение:** хранит список предметов на которые записан участник (в отличие от res_HumanTests где уже фактические результаты).\n\n---\n\n### 15. rbd_CertificateKeys — Ключи сертификатов\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| CertificateKeyID | uniqueidentifier | PRIMARY KEY |\n| Region | int | Код региона |\n| CertificateKey | varbinary | Ключ (хэш) |\n| CertificateKeyType | int | Тип ключа |\n| IsDeleted | bit | Признак удаления |\n\n\n---\n\n## Справочники апелляций\n\n### rbdc_AppealConditions — Статусы апелляций\n\n| Код | Описание |\n|---|---|\n| 10 | Апелляция создана |\n| 11 | Распечатаны бланки |\n| 12 | Введены данные апелляции |\n| 20 | Апелляция на обработке |\n| 30 | Ожидание подтверждения |\n| 32 | Введено подтверждение |\n| 40 | Подтверждение на обработке |\n| 52 | Создано блокирование |\n| 60 | Блокирование на обработке |\n| **100** | **Апелляция удовлетворена** |\n| **101** | **Апелляция отклонена** |\n| **102** | **Завершена (финальный статус)** |\n| 103 | Апелляция заблокирована |\n\n### rbdc_AppealTypes — Типы апелляций\n\n| Код | Описание |\n|---|---|\n| 1 | Апелляция на результат |\n| 2 | Апелляция по процедуре |\n| 4 | Региональная перепроверка |\n| 5 | Пересмотр собеседования (только ОГЭ) |\n\n**Поле WorkStation в ac_Appeals** соответствует AppealCondition — текущий статус обработки.\n\n**Типичные запросы по апелляциям:**\n```sql\n-- Все апелляции участника\nSELECT \n    ap.AppealType,\n    ap.CreateTime AS [Дата подачи],\n    ap.AppealCondition AS [Статус],\n    ap.DeclinedByCommittee AS [Отклонена]\nFROM ac_Appeals ap\nJOIN res_HumanTests ht ON ht.HumanTestID = ap.HumanTestFK AND ht.REGION = ap.REGION\nWHERE ht.ParticipantFK = '<ParticipantID>'\n\n-- Статистика апелляций по результату\nSELECT\n    ap.AppealCondition,\n    COUNT(*) AS [Количество]\nFROM ac_Appeals ap\nWHERE ap.AppealCondition IN (100, 101)\nGROUP BY ap.AppealCondition;\n```\n\n\n---\n\n## Таблицы бланков и сканирования\n\n### sht_Sheets_AB — Бланки ответов части AB\nИдентична ОГЭ. Дополнительно в ЕГЭ QR-код содержит детальную информацию: ID рабочей станции, код региона, ППЭ, аудиторию, время регистрации участника.\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| SheetID | uniqueidentifier | PRIMARY KEY |\n| REGION | int | Код региона |\n| PackageFK | uniqueidentifier | ID пакета |\n| FileName | varchar | Имя файла бланка |\n| RegionCode | int | Код региона |\n| TestTypeCode | int | Тип экзамена |\n| SubjectCode | int | Код предмета |\n| ExamDate | varchar | Дата экзамена |\n| StationCode | int | Код ППЭ |\n| AuditoriumCode | varchar | Код аудитории |\n| Barcode | varchar | Штрихкод бланка |\n| CRC | varchar | Контрольная сумма |\n| Info | xml | QR-код с данными регистрации |\n| ImageNumber | int | Номер изображения |\n| VariantCode | int | Вариант КИМ |\n| HasSignature | bit | Есть подпись |\n| Condition | int | Статус обработки |\n| ProjectBatchID | int | ID партии проекта |\n\n---\n\n### sht_Sheets_C — Бланки ответов части C\nВ ЕГЭ содержит в том числе бланки сочинений (декабрь, предмет 20 — русский язык/литература).\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| SheetID | uniqueidentifier | PRIMARY KEY |\n| REGION | int | Код региона |\n| PackageFK | uniqueidentifier | ID пакета |\n| FileName | varchar | Имя файла |\n| SubjectCode | int | Код предмета |\n| ExamDate | varchar | Дата экзамена |\n| StationCode | int | Код ППЭ |\n| AuditoriumCode | varchar | Код аудитории |\n| Barcode | varchar | Штрихкод |\n| SheetCode | int | Код бланка |\n| ResponsibleCode | varchar | Код ответственного |\n| IsEmpty | bit | Пустой бланк |\n| Condition | int | Статус |\n| DeleteType | smallint | Признак удаления |\n\n---\n\n### sht_Marks_AB — Баллы по заданиям части AB\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| MarkID | uniqueidentifier | PRIMARY KEY |\n| REGION | int | Код региона |\n| SheetFK | uniqueidentifier | **FK → sht_Sheets_AB.SheetID** |\n| TaskTypeCode | int | Тип задания |\n| TaskNumber | int | Номер задания |\n| AnswerValue | varchar | Ответ участника |\n| ReplaceValue | varchar | Заменённый ответ |\n\n---\n\n### sht_Marks_C — Баллы по заданиям части C (экспертная проверка)\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| MarkID | uniqueidentifier | PRIMARY KEY |\n| REGION | int | Код региона |\n| SheetFK | uniqueidentifier | **FK → sht_Sheets_C.SheetID** |\n| ProtocolFile | varchar | Файл протокола (например EGE_Pro0001.tif) |\n| ProtocolCode | varchar | Код протокола |\n| ThirdCheck | bit | Третья проверка |\n| RowNumber | int | Номер строки |\n| TaskNumber | int | Номер задания |\n| MarkValue | varchar | Выставленный балл |\n\n---\n\n## Таблицы результатов\n\n### res_Answers — Ответы участников по заданиям\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| AnswerID | uniqueidentifier | PRIMARY KEY |\n| REGION | int | Код региона |\n| HumanTestFK | uniqueidentifier | **FK → res_HumanTests.HumanTestID** |\n| TaskTypeCode | int | Тип задания (0=часть AB) |\n| TaskNumber | int | Номер задания |\n| AnswerValue | varchar | Ответ участника |\n| ReplaceValue | varchar | Заменённый ответ |\n| CategoryValue | int | Категория ответа |\n\n---\n\n### res_Complects — Комплекты бланков\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| ComplectID | uniqueidentifier | PRIMARY KEY |\n| REGION | int | Код региона |\n| Barcode_AB | varchar | Штрихкод бланка AB |\n| Barcode_C | varchar | Штрихкод бланка C |\n| Barcode_R | varchar | Штрихкод бланка R |\n| Barcode_D | varchar | Штрихкод бланка D |\n| SheetFK_AB | uniqueidentifier | **FK → sht_Sheets_AB.SheetID** |\n| SheetFK_C | uniqueidentifier | **FK → sht_Sheets_C.SheetID** |\n| TestTypeCode | int | Тип экзамена |\n| SubjectCode | int | Код предмета |\n| ExamDate | varchar | Дата экзамена |\n| ZoneCode | int | Код зоны |\n| VariantCode | int | Вариант КИМ |\n| IsTom | bit | Труднодоступное место |\n| ComplectType | tinyint | Тип комплекта |\n\n---\n\n### res_SubComplects — Подкомплекты (доп. бланки)\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| SubComplectID | uniqueidentifier | PRIMARY KEY |\n| REGION | int | Код региона |\n| Barcode_KIM | varchar | Штрихкод КИМ |\n| Barcode_R | varchar | Штрихкод доп. бланка R |\n| Barcode_D | varchar | Штрихкод доп. бланка D |\n| SubjectCode | int | Код предмета |\n| ExamDate | varchar | Дата экзамена |\n| VariantCode | int | Вариант КИМ |\n| IsTom | bit | Труднодоступное место |\n\n---\n\n### res_SubTests — Подтесты (устная часть, модули)\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| SubtestID | uniqueidentifier | PRIMARY KEY |\n| REGION | int | Код региона |\n| HumanTestID | uniqueidentifier | **FK → res_HumanTests.HumanTestID** |\n| ParticipantFK | uniqueidentifier | **FK → rbd_Participants.ParticipantID** |\n| SubtestType | int | Тип подтеста |\n| ModuleCode | tinyint | Код модуля |\n| TestTypeCode | int | Тип экзамена |\n| SubjectCode | int | Код предмета |\n| ExamDate | varchar | Дата экзамена |\n| StationCode | int | Код ППЭ |\n| RunupAuditoriumCode | varchar | Аудитория подготовки (устная часть) |\n| AnswerAuditoriumCode | varchar | Аудитория ответа (устная часть) |\n| VariantCode | int | Вариант |\n| ProcessCondition | int | Статус обработки |\n| Tasks | varbinary | Задания (бинарные данные) |\n| PrimaryMark | int | Первичный балл |\n| Mark | int | Итоговый балл |\n| Minimum | int | Минимальный балл |\n\n---\n\n## Таблицы экспертов\n\n### rbd_Experts — Эксперты\nСтруктура идентична ОГЭ.\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| ExpertID | uniqueidentifier | PRIMARY KEY |\n| REGION | int | Код региона |\n| ExpertCode | int | Код эксперта |\n| Surname | varchar | Фамилия |\n| Name | varchar | Имя |\n| SecondName | varchar | Отчество |\n| DocumentSeries | varchar | Серия документа |\n| DocumentNumber | varchar | Номер документа |\n| Sex | bit | Пол |\n| Seniority | int | Стаж |\n| BirthYear | varchar | Год рождения |\n| Positions | varchar | Должность |\n| Qualification | varchar | Квалификация |\n| SchoolID | uniqueidentifier | **FK → rbd_Schools.SchoolID** |\n| ThirdVerifyAcc | bit | Допуск к третьей проверке |\n| InConflictCommission | bit | Член конфликтной комиссии |\n| ExpertCategoryID | int | Категория эксперта |\n| IsDeleted | bit | Признак удаления |\n| Snils | varchar | СНИЛС |\n| Phones | varchar | Телефон |\n| Mails | varchar | Email |\n\n---\n\n### rbd_ExpertsExams — Назначение экспертов на экзамены\nИдентична ОГЭ.\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| ID | uniqueidentifier | PRIMARY KEY |\n| REGION | int | Код региона |\n| ExpertID | uniqueidentifier | **FK → rbd_Experts.ExpertID** |\n| ExamGlobalID | int | **FK → dat_Exams.ExamGlobalID** |\n| StationsExamsID | uniqueidentifier | **FK → rbd_StationsExams.StationsExamsID** |\n| CheckFormOnExam | int | Форма проверки |\n| IsDeleted | bit | Признак удаления |\n\n---\n\n### rbd_ExpertsSubjects — Предметы экспертов\nИдентична ОГЭ.\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| ID | uniqueidentifier | PRIMARY KEY |\n| REGION | int | Код региона |\n| ExpertID | uniqueidentifier | **FK → rbd_Experts.ExpertID** |\n| SubjectCode | int | **FK → dat_Subjects.SubjectCode** |\n| CheckForm | int | Форма проверки |\n| ExpertCategoryID | int | Категория по предмету |\n| ThirdVerifyAcc | bit | Допуск к третьей проверке |\n| InConflictCommission | bit | Член конфликтной комиссии |\n| IsDeleted | bit | Признак удаления |\n\n---\n\n## Справочные таблицы экзаменов\n\n### dat_Exams — Справочник экзаменов\nИдентична ОГЭ.\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| ExamGlobalID | int | PRIMARY KEY |\n| SchemeVersionID | decimal | Версия схемы |\n| TestTypeCode | int | Тип экзамена (4=ЕГЭ, 5=ГВЭ) |\n| SubjectCode | int | **FK → dat_Subjects.SubjectCode** |\n| ExamDate | varchar | Дата экзамена |\n| WaveCode | int | **FK → dat_Waves.WaveCode** |\n| ExamType | int | Тип экзамена |\n\n---\n\n### dat_Waves — Волны экзаменов\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| WaveGlobalID | int | PRIMARY KEY |\n| SchemeVersionID | decimal | Версия схемы |\n| WaveCode | int | Код волны |\n| WaveName | varchar | Название волны |\n\n**Значения WaveCode для ЕГЭ:**\n- 0 = Досрочный февральский этап (сочинение)\n- 1 = Досрочный этап\n- 2 = Основной этап\n- 3 = Дополнительный этап (сентябрь)\n\n**Использование в запросах:**\n```sql\nJOIN dat_Exams e ON e.SubjectCode = ht.SubjectCode AND e.ExamDate = ht.ExamDate\nWHERE e.WaveCode = 2  -- только основной этап\n```\n\n---\n\n## Аудитории и ППЭ\n\n### rbd_Auditoriums — Аудитории\nИдентична ОГЭ.\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| AuditoriumID | uniqueidentifier | PRIMARY KEY |\n| REGION | int | Код региона |\n| StationID | uniqueidentifier | **FK → rbd_Stations.StationID** |\n| AuditoriumCode | varchar | Код аудитории |\n| AuditoriumName | varchar | Название |\n| RowsCount | int | Количество рядов |\n| ColsCount | int | Мест в ряду |\n| LimitPotencial | int | Вместимость |\n| ExamForm | int | Форма проведения |\n| VideoControl | bit | Видеонаблюдение |\n| IsLab | bit | Лаборатория (информатика) |\n| DeleteType | int | Признак удаления |\n\n---\n\n### rbd_AuditoriumsSubjects — Предметы в аудиториях\nИдентична ОГЭ.\n\n---\n\n### rbd_StationsExams — Экзамены в ППЭ\nИдентична ОГЭ.\n\n---\n\n## Сертификаты ЕГЭ (аттестаты)\n\n### fbs_ExamCertificates — Свидетельства о результатах ЕГЭ\n**Отличие от ОГЭ** — в ЕГЭ есть таблица аттестатов, в ОГЭ она пустая.\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| CertificateId | uniqueidentifier | PRIMARY KEY |\n| ParticipantID | uniqueidentifier | **FK → rbd_Participants.ParticipantID** |\n| Region | int | Код региона |\n| RegistrationNumber | varchar | Регистрационный номер свидетельства |\n| TypographicNumber | varchar | Типографский номер |\n| CYear | int | Год выдачи |\n| Status | varchar | Статус свидетельства |\n| ImportDate | datetime | Дата импорта |\n\n---\n\n### fbs_ExamCertificateMarks — Баллы в свидетельстве ЕГЭ\n\n| Столбец | Тип | Описание |\n|---|---|---|\n| MarkId | uniqueidentifier | PRIMARY KEY |\n| CertificateId | uniqueidentifier | **FK → fbs_ExamCertificates.CertificateId** |\n| Region | int | Код региона |\n| Subject | int | **FK → dat_Subjects.SubjectCode** Код предмета |\n| Mark | varchar | Балл в свидетельстве |\n| Appeal | bit | Результат апелляции |\n| Pass | int | Преодолел минимальный порог |\n\n**Примечание:** таблицы заполняются после завершения всей кампании ЕГЭ.\n\n\n---\n\n## Актуальный рабочий запрос ЕГЭ 2025\n\n```sql\nUSE erbd_ege_reg_25_89;\n\nSELECT\n    ISNULL(CAST(pc.Changes AS xml).value('(Changes/Change[Column=\"Surname\"]/NewValue)[1]','varchar(80)'),p.Surname)+' '+\n    ISNULL(CAST(pc.Changes AS xml).value('(Changes/Change[Column=\"Name\"]/NewValue)[1]','varchar(80)'),p.Name)+' '+\n    ISNULL(CAST(pc.Changes AS xml).value('(Changes/Change[Column=\"SecondName\"]/NewValue)[1]','varchar(80)'),ISNULL(p.SecondName,'')) AS [ФИО],\n    ISNULL(CAST(pc.Changes AS xml).value('(Changes/Change[Column=\"DocumentSeries\"]/NewValue)[1]','varchar(9)'),p.DocumentSeries)+' '+\n    ISNULL(CAST(pc.Changes AS xml).value('(Changes/Change[Column=\"DocumentNumber\"]/NewValue)[1]','varchar(12)'),p.DocumentNumber) AS [Документ],\n    p.pClass AS [Класс],\n    sch.SchoolName AS [Школа],\n    a.AreaName AS [Муниципалитет],\n    CASE p.ParticipantCategoryFK\n        WHEN 1  THEN 'ВТГ'\n        WHEN 3  THEN 'СПО'\n        WHEN 4  THEN 'ВПЛ'\n        WHEN 8  THEN 'Не завершил ГИА'\n        WHEN 9  THEN 'Иностранная организация'\n        WHEN 10 THEN 'Завершил по предмету'\n        ELSE 'Иное'\n    END AS [Категория],\n    CASE ht.TestTypeCode WHEN 4 THEN 'ЕГЭ' WHEN 5 THEN 'ГВЭ' END AS [Форма],\n    ht.SubjectCode AS [Код предмета],\n    s.SubjectName AS [Предмет],\n    ht.ExamDate AS [Дата экзамена],\n    w.WaveName AS [Волна],\n    CASE\n        WHEN e.WaveCode = 1 AND ht.ExamDate NOT IN ('2025.03.25','2025.03.28') THEN 'ДОСРОК'\n        WHEN e.WaveCode = 2 AND ht.ExamDate IN ('2025.05.23','2025.05.27','2025.05.30','2025.06.02','2025.06.05','2025.06.10','2025.06.11') THEN 'ОСН'\n        WHEN e.WaveCode = 2 AND ht.ExamDate IN ('2025.06.16','2025.06.17','2025.06.18','2025.06.19','2025.06.20','2025.06.23') THEN 'РЕЗЕРВ'\n        WHEN e.WaveCode = 2 AND ht.ExamDate IN ('2025.07.03','2025.07.04') THEN 'ИЮЛЬ'\n        WHEN e.WaveCode = 3 THEN 'ПЕРЕСД'\n        ELSE 'Иное'\n    END AS [Период],\n    m.PrimaryMark AS [Первичный балл],\n    m.Mark100 AS [Тестовый балл],\n    m.Mark5 AS [Оценка],\n    -- Количество уникальных предметов участника\n    (SELECT COUNT(DISTINCT ht2.SubjectCode) FROM res_HumanTests ht2\n     JOIN res_Marks m2 ON m2.HumanTestID=ht2.HumanTestID AND m2.REGION=ht2.REGION\n     WHERE ht2.ParticipantFK=p.ParticipantID AND ht2.REGION=p.Region\n       AND ht2.TestTypeCode IN (4,5)) AS [Кол-во предметов],\n    -- Флаг: сдал обязательные (русский + любая математика)\n    CASE\n        WHEN EXISTS (SELECT 1 FROM res_HumanTests ht2\n            JOIN res_Marks m2 ON m2.HumanTestID=ht2.HumanTestID AND m2.REGION=ht2.REGION\n            WHERE ht2.ParticipantFK=p.ParticipantID AND ht2.REGION=p.Region\n              AND ht2.TestTypeCode IN (4,5) AND ht2.SubjectCode IN (1,51))\n        AND EXISTS (SELECT 1 FROM res_HumanTests ht3\n            JOIN res_Marks m3 ON m3.HumanTestID=ht3.HumanTestID AND m3.REGION=ht3.REGION\n            WHERE ht3.ParticipantFK=p.ParticipantID AND ht3.REGION=p.Region\n              AND ht3.TestTypeCode IN (4,5) AND ht3.SubjectCode IN (2,22,52))\n        THEN 1 ELSE 0\n    END AS [Сдал обязательные],\n    -- Флаг: матпроф + хотя бы один предмет ест.наук\n    CASE\n        WHEN EXISTS (SELECT 1 FROM res_HumanTests ht4\n            JOIN res_Marks m4 ON m4.HumanTestID=ht4.HumanTestID AND m4.REGION=ht4.REGION\n            WHERE ht4.ParticipantFK=p.ParticipantID AND ht4.REGION=p.Region\n              AND ht4.TestTypeCode IN (4,5) AND ht4.SubjectCode = 2)\n        AND EXISTS (SELECT 1 FROM res_HumanTests ht5\n            JOIN res_Marks m5 ON m5.HumanTestID=ht5.HumanTestID AND m5.REGION=ht5.REGION\n            WHERE ht5.ParticipantFK=p.ParticipantID AND ht5.REGION=p.Region\n              AND ht5.TestTypeCode IN (4,5) AND ht5.SubjectCode IN (3,4,6))\n        THEN 1 ELSE 0\n    END AS [Матпроф и ест науки]\nFROM rbd_Participants p\nLEFT JOIN ac_PersonsCorrections pc ON pc.PersonID = p.ParticipantID\nJOIN res_HumanTests ht ON ht.ParticipantFK = p.ParticipantID AND ht.REGION = p.Region\nJOIN res_Marks m ON m.HumanTestID = ht.HumanTestID AND m.REGION = ht.REGION\nJOIN dat_Exams e ON e.SubjectCode = ht.SubjectCode AND e.ExamDate = ht.ExamDate AND e.TestTypeCode = ht.TestTypeCode\nJOIN dat_Waves w ON w.WaveCode = e.WaveCode\nLEFT JOIN dat_Subjects s ON s.SubjectCode = ht.SubjectCode\nLEFT JOIN rbd_Schools sch ON sch.SchoolID = p.SchoolRegistration AND sch.REGION = p.Region\nLEFT JOIN rbd_Areas a ON a.AreaID = sch.AreaFK AND a.Region = sch.REGION\nWHERE ht.TestTypeCode IN (4,5)\nORDER BY [ФИО], s.SubjectName;\n```\n\n## Актуальный рабочий запрос ЕГЭ 2026\n\n```sql\nUSE erbd_ege_reg_26_89;\n\nSELECT\n    ISNULL(CAST(pc.Changes AS xml).value('(Changes/Change[Column=\"Surname\"]/NewValue)[1]','varchar(80)'),p.Surname)+' '+\n    ISNULL(CAST(pc.Changes AS xml).value('(Changes/Change[Column=\"Name\"]/NewValue)[1]','varchar(80)'),p.Name)+' '+\n    ISNULL(CAST(pc.Changes AS xml).value('(Changes/Change[Column=\"SecondName\"]/NewValue)[1]','varchar(80)'),ISNULL(p.SecondName,'')) AS [ФИО],\n    ISNULL(CAST(pc.Changes AS xml).value('(Changes/Change[Column=\"DocumentSeries\"]/NewValue)[1]','varchar(9)'),p.DocumentSeries)+' '+\n    ISNULL(CAST(pc.Changes AS xml).value('(Changes/Change[Column=\"DocumentNumber\"]/NewValue)[1]','varchar(12)'),p.DocumentNumber) AS [Документ],\n    p.pClass AS [Класс],\n    sch.SchoolName AS [Школа],\n    a.AreaName AS [Муниципалитет],\n    CASE p.ParticipantCategoryFK\n        WHEN 1  THEN 'ВТГ'\n        WHEN 3  THEN 'СПО'\n        WHEN 4  THEN 'ВПЛ'\n        WHEN 8  THEN 'Не завершил ГИА'\n        WHEN 9  THEN 'Иностранная организация'\n        WHEN 10 THEN 'Завершил по предмету'\n        ELSE 'Иное'\n    END AS [Категория],\n    CASE ht.TestTypeCode WHEN 4 THEN 'ЕГЭ' WHEN 5 THEN 'ГВЭ' END AS [Форма],\n    ht.SubjectCode AS [Код предмета],\n    s.SubjectName AS [Предмет],\n    ht.ExamDate AS [Дата экзамена],\n    w.WaveName AS [Волна],\n    CASE\n        WHEN e.WaveCode = 1 THEN 'ДОСРОК'\n        WHEN e.WaveCode = 2 AND ht.ExamDate IN ('2026.06.01','2026.06.04','2026.06.08','2026.06.11','2026.06.15','2026.06.18','2026.06.19') THEN 'ОСН'\n        WHEN e.WaveCode = 2 AND ht.ExamDate IN ('2026.06.22','2026.06.23','2026.06.24','2026.06.25') THEN 'РЕЗЕРВ'\n        WHEN e.WaveCode = 2 AND ht.ExamDate IN ('2026.07.08','2026.07.09') THEN 'ИЮЛЬ'\n        WHEN e.WaveCode = 3 THEN 'ПЕРЕСД'\n        ELSE 'Иное'\n    END AS [Период],\n    m.PrimaryMark AS [Первичный балл],\n    m.Mark100 AS [Тестовый балл],\n    m.Mark5 AS [Оценка],\n    -- Количество уникальных предметов участника\n    (SELECT COUNT(DISTINCT ht2.SubjectCode) FROM res_HumanTests ht2\n     JOIN res_Marks m2 ON m2.HumanTestID=ht2.HumanTestID AND m2.REGION=ht2.REGION\n     WHERE ht2.ParticipantFK=p.ParticipantID AND ht2.REGION=p.Region\n       AND ht2.TestTypeCode IN (4,5)) AS [Кол-во предметов],\n    -- Флаг: сдал обязательные (русский + любая математика)\n    CASE\n        WHEN EXISTS (SELECT 1 FROM res_HumanTests ht2\n            JOIN res_Marks m2 ON m2.HumanTestID=ht2.HumanTestID AND m2.REGION=ht2.REGION\n            WHERE ht2.ParticipantFK=p.ParticipantID AND ht2.REGION=p.Region\n              AND ht2.TestTypeCode IN (4,5) AND ht2.SubjectCode IN (1,51))\n        AND EXISTS (SELECT 1 FROM res_HumanTests ht3\n            JOIN res_Marks m3 ON m3.HumanTestID=ht3.HumanTestID AND m3.REGION=ht3.REGION\n            WHERE ht3.ParticipantFK=p.ParticipantID AND ht3.REGION=p.Region\n              AND ht3.TestTypeCode IN (4,5) AND ht3.SubjectCode IN (2,22,52))\n        THEN 1 ELSE 0\n    END AS [Сдал обязательные],\n    -- Флаг: матпроф + хотя бы один предмет ест.наук\n    CASE\n        WHEN EXISTS (SELECT 1 FROM res_HumanTests ht4\n            JOIN res_Marks m4 ON m4.HumanTestID=ht4.HumanTestID AND m4.REGION=ht4.REGION\n            WHERE ht4.ParticipantFK=p.ParticipantID AND ht4.REGION=p.Region\n              AND ht4.TestTypeCode IN (4,5) AND ht4.SubjectCode = 2)\n        AND EXISTS (SELECT 1 FROM res_HumanTests ht5\n            JOIN res_Marks m5 ON m5.HumanTestID=ht5.HumanTestID AND m5.REGION=ht5.REGION\n            WHERE ht5.ParticipantFK=p.ParticipantID AND ht5.REGION=p.Region\n              AND ht5.TestTypeCode IN (4,5) AND ht5.SubjectCode IN (3,4,6))\n        THEN 1 ELSE 0\n    END AS [Матпроф и ест науки]\nFROM rbd_Participants p\nLEFT JOIN ac_PersonsCorrections pc ON pc.PersonID = p.ParticipantID\nJOIN res_HumanTests ht ON ht.ParticipantFK = p.ParticipantID AND ht.REGION = p.Region\nJOIN res_Marks m ON m.HumanTestID = ht.HumanTestID AND m.REGION = ht.REGION\nJOIN dat_Exams e ON e.SubjectCode = ht.SubjectCode AND e.ExamDate = ht.ExamDate AND e.TestTypeCode = ht.TestTypeCode\nJOIN dat_Waves w ON w.WaveCode = e.WaveCode\nLEFT JOIN dat_Subjects s ON s.SubjectCode = ht.SubjectCode\nLEFT JOIN rbd_Schools sch ON sch.SchoolID = p.SchoolRegistration AND sch.REGION = p.Region\nLEFT JOIN rbd_Areas a ON a.AreaID = sch.AreaFK AND a.Region = sch.REGION\nWHERE ht.TestTypeCode IN (4,5)\nORDER BY [ФИО], s.SubjectName;\n```\n"
