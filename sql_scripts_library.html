<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Библиотека SQL-запросов и скриптов</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Unbounded:wght@400;600&family=Inter:wght@400;500&display=swap');
:root{--bg:#0f1117;--surface:#181c27;--surface2:#1e2335;--border:#2a3045;--blue:#4a9eff;--green:#3ecf8e;--purple:#a855f7;--text:#e8eaf0;--muted:#6b7280;--dim:#9ca3af;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{padding:2.5rem 2rem 1.5rem;border-bottom:1px solid var(--border);}
.header-inner{max-width:1100px;margin:0 auto;}
h1{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:600;letter-spacing:-0.5px;}
.header p{font-size:13px;color:var(--muted);margin-top:6px;}
.tabs{display:flex;gap:6px;padding:1.25rem 2rem;max-width:1100px;margin:0 auto;flex-wrap:wrap;}
.tab{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;font-size:13px;color:var(--muted);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.tab:hover{color:var(--dim);}
.tab.active{background:var(--surface2);border-color:#3a4055;color:var(--text);}
.main{max-width:1100px;margin:0 auto;padding:0 2rem 3rem;}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .2s;}
.card.sql::before{background:linear-gradient(90deg,var(--blue),transparent);}
.card.script::before{background:linear-gradient(90deg,var(--purple),transparent);}
.card.oge::before{background:linear-gradient(90deg,var(--green),transparent);}
.card.mvd::before{background:linear-gradient(90deg,#dc2626,transparent);}
.card.vitrina::before{background:linear-gradient(90deg,#059669,transparent);}
.card:hover{border-color:#3a4055;transform:translateY(-1px);}
.card:hover::before{opacity:1;}
.badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 8px;border-radius:4px;margin-bottom:10px;font-family:'JetBrains Mono',monospace;}
.badge-ege{background:rgba(74,158,255,.15);color:var(--blue);}
.badge-oge{background:rgba(62,207,142,.15);color:var(--green);}
.badge-script{background:rgba(168,85,247,.15);color:var(--purple);}
.badge-mvd{background:rgba(220,38,38,.15);color:#dc2626;}
.badge-vitrina{background:rgba(16,185,129,.15);color:#059669;}
.badge-fmt{display:inline-block;font-size:10px;font-weight:500;padding:2px 6px;border-radius:4px;margin-bottom:10px;margin-left:4px;font-family:'JetBrains Mono',monospace;background:rgba(255,255,255,.08);color:var(--dim);}
.card-title{font-size:14px;font-weight:500;margin-bottom:6px;line-height:1.4;}
.card-desc{font-size:12px;color:var(--muted);line-height:1.6;}
.card-meta{font-size:11px;color:var(--muted);margin-top:12px;font-family:'JetBrains Mono',monospace;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;padding:2rem 1rem;overflow-y:auto;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;align-items:flex-start;justify-content:center;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:760px;overflow:hidden;}
.modal-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;}
.modal-title{font-size:16px;font-weight:500;}
.modal-sub{font-size:12px;color:var(--muted);margin-top:4px;font-family:'JetBrains Mono',monospace;}
.modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;flex-shrink:0;}
.modal-close:hover{color:var(--text);}
.actions{padding:.75rem 1.5rem;display:flex;gap:8px;border-bottom:1px solid var(--border);}
.actions.bottom{border-bottom:none;border-top:1px solid var(--border);}
.btn{padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);font-size:12px;color:var(--dim);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.btn:hover{border-color:#3a4055;color:var(--text);}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue);}
.btn.primary:hover{opacity:.9;}
.code-block{background:#0a0d14;padding:1.25rem 1.5rem;font-family:'JetBrains Mono',monospace;font-size:12px;color:#c9d1d9;line-height:1.7;overflow-x:auto;white-space:pre;max-height:420px;overflow-y:auto;}
.code-block::-webkit-scrollbar{width:6px;height:6px;}
.code-block::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <h1>Библиотека запросов и скриптов</h1>
    <p>SQL-запросы для выгрузки результатов ГИА · Скрипты мониторинга ППЭ</p>
  </div>
</div>
<div class="tabs">
  <button class="tab active" onclick="filter('all',this)">Все</button>
  <button class="tab" onclick="filter('ege',this)">ЕГЭ</button>
  <button class="tab" onclick="filter('oge',this)">ОГЭ</button>
  <button class="tab" onclick="filter('script',this)">Скрипты</button>
  <button class="tab" onclick="filter('mvd',this)">Проверки МВД</button>
  <button class="tab" onclick="filter('vitrina',this)">Витрина</button>
</div>
<div class="main"><div id="cards" class="cards"></div></div>
<div class="modal-overlay" id="modal" onclick="handleOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <div><div class="modal-title" id="modal-title"></div><div class="modal-sub" id="modal-sub"></div></div>
      <button class="modal-close" onclick="closeModal()">&#215;</button>
    </div>
    <div class="actions">
      <button class="btn primary" onclick="copyCode()">&#8856; Скопировать</button>
      <button class="btn" onclick="downloadCode()">&#8595; Скачать</button>
    </div>
    <div class="code-block" id="modal-code"></div>
    <div class="actions bottom">
      <button class="btn primary" onclick="copyCode()">&#8856; Скопировать</button>
      <button class="btn" onclick="downloadCode()">&#8595; Скачать</button>
    </div>
  </div>
</div>

const items = _b64items.map(b => JSON.parse(decodeURIComponent(escape(atob(b)))));

let cur={code:'',ext:'.txt',title:''},curFilter='all';

function filter(type,el){curFilter=type;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');render();}

function render(){
  const container=document.getElementById('cards');
  const filtered=curFilter==='all'?items:items.filter(q=>q.type===curFilter);
  if(!filtered.length){container.innerHTML='<div style="padding:3rem;text-align:center;color:#6b7280">Нет элементов</div>';return;}
  container.innerHTML=filtered.map(q=>`
    <div class="card ${q.css}" onclick="openModal(${q.id})">
      <span class="badge badge-${q.type==='script'?'script':q.type}">${q.type==='ege'?'ЕГЭ':q.type==='oge'?'ОГЭ':q.type==='mvd'?'МВД':q.type==='vitrina'?'ВИТРИНА':'СКРИПТ'}</span><span class="badge badge-fmt">${q.ext==='.sql'?'SQL':q.ext==='.md'?'MD':q.ext==='.py'?'Python':q.ext==='.user.js'?'JS':'файл'}</span>
      <div class="card-title">${q.title}</div>
      <div class="card-desc">${q.desc}</div>
      <div class="card-meta">&#9656; ${q.meta}</div>
    </div>`).join('');
}

function openModal(id){
  const q=items.find(x=>x.id===id);
  document.getElementById('modal-title').textContent=q.title;
  document.getElementById('modal-sub').textContent=q.meta;
  document.getElementById('modal-code').textContent=q.code;
  cur={code:q.code,ext:q.ext,title:q.title};
  document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open');}
function handleOverlay(e){if(e.target===document.getElementById('modal'))closeModal();}

function copyCode(){
  navigator.clipboard.writeText(cur.code).then(()=>{
    document.querySelectorAll('.btn.primary').forEach(btn=>{btn.textContent='\u2713 Скопировано';setTimeout(()=>btn.textContent='\u2298 Скопировать',2000);});
  });
}

function downloadCode(){
  const blob=new Blob([cur.code],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=cur.title+cur.ext;a.click();URL.revokeObjectURL(a.href);
}

render();
</script>
